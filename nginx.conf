server {
    server_name tmstreet.network www.tmstreet.network;

    client_max_body_size 50m;

    # Discord bot API (proxy cors) - debe ir ANTES del location /
    location ^~ /api/discord {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Webhooks (proxy cors) - debe ir ANTES del location /
    location ^~ /api/webhook {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Next.js frontend + API routes (todo lo demas va al puerto 3005)
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSL configuration
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/tmstreet.network/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tmstreet.network/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name tmstreet.network www.tmstreet.network;

    if ($host = www.tmstreet.network) {
        return 301 https://$host$request_uri;
    }

    if ($host = tmstreet.network) {
        return 301 https://$host$request_uri;
    }

    return 404;
}